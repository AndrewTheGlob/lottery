<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lotto Lab">
    
    <title>Lotto Lab | 精準選號</title>
    
    <style>
        :root {
            --primary-dark: #1a1a1a;
            --accent-red: #ff3b30;
            --accent-gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #121212 100%);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            width: 85%;
            max-width: 380px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mode-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 30px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 10px;
        }

        .mode-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .result-display {
            min-height: 140px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .number-ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            animation: ballPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .number-ball.special {
            background: linear-gradient(135deg, #ffd700, #ffae00);
            box-shadow: 0 0 25px rgba(255, 174, 0, 0.4);
        }

        @keyframes ballPop {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .main-action {
            background: #ffffff;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-action:active {
            transform: scale(0.96);
            background: #cccccc;
        }

        .status-text {
            font-size: 0.8rem;
            color: #555;
            margin-top: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-card">
    <header>
        <h1>LOTTO LAB</h1>
    </header>
    
    <div class="mode-selector">
        <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">6 / 49</button>
        <button class="mode-btn" id="tab-super" onclick="switchMode('super')">SUPER 7</button>
    </div>

    <div class="result-display" id="display">
        </div>

    <button class="main-action" onclick="generate()">Generate</button>
    
    <div class="status-text" id="status">READY TO DRAW</div>
</div>

<script>
    let mode = 'lotto';

    function switchMode(newMode) {
        mode = newMode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${newMode}`).classList.add('active');
        document.getElementById('display').innerHTML = '';
        document.getElementById('status').innerText = newMode === 'lotto' ? 'LOTTO 6/49 MODE' : 'SUPER 7 MODE';
    }

    function generate() {
        const display = document.getElementById('display');
        display.innerHTML = '';
        
        if (window.navigator.vibrate) window.navigator.vibrate(10);

        if (mode === 'lotto') {
            const nums = pick(49, 6);
            nums.forEach((n, i) => {
                setTimeout(() => addBall(n, false), i * 80);
            });
        } else {
            const z1 = pick(38, 6);
            const z2 = Math.floor(Math.random() * 8) + 1;
            z1.forEach((n, i) => {
                setTimeout(() => addBall(n, false), i * 80);
            });
            setTimeout(() => addBall(z2, true), 560);
        }
    }

    function pick(max, count) {
        let p = Array.from({length: max}, (_, i) => i + 1);
        return Array.from({length: count}, () => p.splice(Math.floor(Math.random() * p.length), 1)[0]).sort((a,b) => a-b);
    }

    function addBall(num, isSpecial) {
        const b = document.createElement('div');
        b.className = `number-ball ${isSpecial ? 'special' : ''}`;
        b.innerText = num.toString().padStart(2, '0');
        document.getElementById('display').appendChild(b);
    }
</script>

</body>
</html>
