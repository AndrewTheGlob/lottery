<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caishen Node | 財神數位祭壇</title>
    <style>
        :root {
            --imperial-red: #8b0000;
            --vivid-red: #e60012;
            --gold-leaf: #d4af37;
            --smoke: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto;
        }

        .smoke-wrap { position: fixed; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .smoke-particle { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, var(--smoke) 0%, transparent 70%); bottom: -150px; border-radius: 50%; animation: rise 12s infinite linear; opacity: 0; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.8); opacity: 0; } }

        .app-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 35px; width: 90%; max-width: 380px; padding: 35px 15px; text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); position: relative; box-sizing: border-box; margin: 20px 0;
        }

        header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; margin: 0; background: linear-gradient(180deg, #fff, var(--gold-leaf)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 0.6rem; color: var(--gold-leaf); opacity: 0.4; margin-top: 5px; margin-bottom: 20px; letter-spacing: 2px; }

        .mode-selector { display: flex; background: rgba(0, 0, 0, 0.5); border-radius: 15px; padding: 6px; margin-bottom: 20px; border: 1px solid rgba(212, 175, 55, 0.1); gap: 10px; }
        .mode-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #555; font-weight: 800; font-size: 0.75rem; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .mode-btn.active { background: var(--imperial-red); color: var(--gold-leaf); }

        .ritual-zone { height: 80px; display: flex; justify-content: center; align-items: center; gap: 15px; perspective: 500px; }
        .block { 
            width: 35px; height: 55px; background: var(--vivid-red); 
            border-radius: 50% 10% 10% 50% / 50% 10% 10% 50%;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4), 0 8px 15px rgba(0,0,0,0.5);
            display: none;
        }
        .block.show { display: block; }
        .block.flat { transform: rotateY(180deg); background: #eee; border: 1px solid #ccc; }
        
        @keyframes toss {
            0% { transform: translateY(0) rotateX(0) rotateZ(0); }
            100% { transform: translateY(0) rotateX(1080deg) rotateZ(360deg); }
        }
        .tossing { animation: toss 0.7s ease-out; }

        .result-display { min-height: 110px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 8px; margin: 15px auto; max-width: 260px; justify-items: center; align-items: center; }
        .result-display.super-mode { grid-template-columns: repeat(4, 1fr); }

        .ball {
            width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; font-weight: 800; color: #600; line-height: 1;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #d1d1d1 100%);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.5);
            animation: ballPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        .ball.special { background: radial-gradient(circle at 30% 30%, #fff 0%, var(--gold-leaf) 100%); color: #430; }
        @keyframes ballPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 解籤互動區 */
        .oracle-wrapper { margin-top: 15px; display: none; }
        .oracle-wrapper.active { display: block; }
        
        .fold-btn {
            background: rgba(212, 175, 55, 0.1); color: var(--gold-leaf);
            border: 1px solid rgba(212, 175, 55, 0.3); padding: 8px 20px;
            border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
        }
        .fold-btn:hover { background: rgba(212, 175, 55, 0.2); }

        .oracle-content { 
            max-height: 0; opacity: 0; overflow: hidden; transition: all 0.6s ease;
            text-align: left; margin-top: 10px;
        }
        .oracle-content.open { max-height: 250px; opacity: 1; }

        .oracle-tag { font-size: 0.9rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--gold-leaf); display: block; margin-bottom: 5px; text-align: center; }
        .oracle-desc { font-size: 0.75rem; color: #ccc; line-height: 1.6; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; }

        .action-btn {
            background: linear-gradient(180deg, #900 0%, var(--imperial-red) 100%);
            color: var(--gold-leaf); border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%; padding: 18px; font-size: 1rem; font-weight: 900; border-radius: 18px;
            cursor: pointer; letter-spacing: 5px; margin-top: 20px; transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="smoke-wrap">
        <div class="smoke-particle" style="left: 10%;"></div>
        <div class="smoke-particle" style="left: 50%; animation-delay: -4s;"></div>
        <div class="smoke-particle" style="left: 80%; animation-delay: -8s;"></div>
    </div>

    <div class="app-card">
        <header>
            <h1>CAISHEN NODE</h1>
            <p>Predictive Ritual Protocol</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">大樂透</button>
            <button class="mode-btn" id="tab-super" onclick="switchMode('super')">威力彩</button>
        </div>

        <div class="ritual-zone">
            <div class="block" id="b1"></div>
            <div class="block" id="b2"></div>
        </div>

        <div class="result-display" id="display"></div>

        <div class="oracle-wrapper" id="oracle-wrap">
            <button class="fold-btn" id="toggle-btn" onclick="toggleOracle()">解鎖神諭</button>
            <div class="oracle-content" id="oracle-box">
                <span class="oracle-tag" id="status"></span>
                <div class="oracle-desc" id="desc"></div>
            </div>
        </div>

        <button class="action-btn" id="main-btn" onclick="performRitual()">召喚財富</button>
        <div style="margin-top: 25px; font-size: 0.5rem; color: rgba(212, 175, 55, 0.2); letter-spacing: 3px;">DIVINE ALGORITHM SECURED</div>
    </div>

    <script>
        let mode = 'lotto';
        const oracles = [
            { t: "天命所歸", d: "此數組與數位星盤產生強烈共鳴，磁場穩定且具有極強穿透力，實屬上乘之選。" },
            { t: "紫氣東來", d: "檢測到財帛位有明顯波動，此數字排列隱含乾坤定數，建議心誠則靈。" },
            { t: "金玉滿堂", d: "五行水火既濟，此佈局符合當前時空節點的財富路徑，建議善加利用。" },
            { t: "龍脈相連", d: "連珠炮發之勢，號碼間存在隱性關聯，象徵財源滾滾，連綿不絕。" },
            { t: "五行和諧", d: "佈局平實穩重，數值跨度適中。雖無瞬間爆發之勢，但根基穩固。" },
            { t: "利涉大川", d: "格局開闊，適合跨度較大的投注策略。氣勢如虹，勢不可擋。" },
            { t: "守株待兔", d: "氣場沉穩，建議長期持有，靜候數位洪流的到來。" },
            { t: "風雲際會", d: "奇偶交替頻繁，象徵變化中隱藏巨大契機。出奇制勝在此一舉。" },
            { t: "潛龍勿用", d: "氣場處於沉澱期。這組號碼象徵「守」，適合小試牛刀。" }
        ];

        function switchMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${m}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('display').className = 'result-display' + (m === 'super' ? ' super-mode' : '');
            document.getElementById('oracle-wrap').classList.remove('active');
            document.getElementById('oracle-box').classList.remove('open');
        }

        function toggleOracle() {
            const box = document.getElementById('oracle-box');
            const btn = document.getElementById('toggle-btn');
            box.classList.toggle('open');
            btn.innerText = box.classList.contains('open') ? '收起神諭' : '解鎖神諭';
        }

        async function performRitual() {
            const disp = document.getElementById('display');
            const btn = document.getElementById('main-btn');
            const wrap = document.getElementById('oracle-wrap');
            const box = document.getElementById('oracle-box');
            const b1 = document.getElementById('b1');
            const b2 = document.getElementById('b2');

            disp.innerHTML = '';
            wrap.classList.remove('active');
            box.classList.remove('open');
            document.getElementById('toggle-btn').innerText = '解鎖神諭';
            btn.disabled = true;

            b1.className = 'block show tossing';
            b2.className = 'block show tossing flat';
            await new Promise(r => setTimeout(r, 700));
            b1.classList.remove('tossing'); b2.classList.remove('tossing');
            await new Promise(r => setTimeout(r, 300));

            let pool = Array.from({length: (mode === 'lotto' ? 49 : 38)}, (_, i) => i + 1);
            let nums = [];
            for(let i=0; i<6; i++) nums.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
            nums.sort((a,b)=>a-b);

            nums.forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'ball'; b.innerText = n.toString().padStart(2, '0');
                    disp.appendChild(b);
                }, i * 150);
            });

            if (mode === 'super') {
                setTimeout(() => {
                    const sb = document.createElement('div');
                    sb.className = 'ball special'; sb.innerText = (Math.floor(Math.random()*8)+1).toString().padStart(2, '0');
                    disp.appendChild(sb);
                }, 900);
            }

            setTimeout(() => {
                const roll = Math.random();
                let prob;
                if(roll < 0.05) prob = Math.floor(Math.random() * 8) + 92;
                else if(roll < 0.15) prob = Math.floor(Math.random() * 11) + 80;
                else prob = Math.floor(Math.random() * 40) + 40;

                const picked = oracles[Math.floor(Math.random()*oracles.length)];
                document.getElementById('status').innerText = `【${picked.t}】機率共振 ${prob}%`;
                document.getElementById('desc').innerText = picked.d;
                wrap.classList.add('active');
                btn.disabled = false;
            }, 1200);
        }
    </script>
</body>
</html>
