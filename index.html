<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CaishenNode">
    
    <title>Caishen Node | Advanced Ritual</title>
    
    <style>
        :root {
            --imperial-red: #8b0000;
            --vivid-red: #e60012;
            --gold-leaf: #d4af37;
            --smoke: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto;
        }

        .smoke-wrap { position: fixed; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .smoke-particle { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, var(--smoke) 0%, transparent 70%); bottom: -150px; border-radius: 50%; animation: rise 12s infinite linear; opacity: 0; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.8); opacity: 0; } }

        .app-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 35px;
            width: 90%; max-width: 380px; padding: 35px 15px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.8); position: relative; box-sizing: border-box; margin: 20px 0;
        }

        header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; margin: 0; background: linear-gradient(180deg, #fff, var(--gold-leaf)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 0.6rem; color: var(--gold-leaf); opacity: 0.4; margin-top: 5px; margin-bottom: 20px; letter-spacing: 2px; }

        .mode-selector { display: flex; background: rgba(0, 0, 0, 0.5); border-radius: 15px; padding: 6px; margin-bottom: 20px; border: 1px solid rgba(212, 175, 55, 0.1); gap: 10px; }
        .mode-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #555; font-weight: 800; font-size: 0.75rem; cursor: pointer; transition: 0.4s; border-radius: 10px; }
        .mode-btn.active { background: var(--imperial-red); color: var(--gold-leaf); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .ritual-zone { height: 80px; display: flex; justify-content: center; align-items: center; position: relative; }
        .censer-wrap { position: absolute; bottom: 0; display: flex; flex-direction: column; align-items: center; opacity: 0.2; transition: 0.5s; }
        .app-card.ritual-active .censer-wrap { opacity: 1; }
        .incense-sticks { display: flex; gap: 5px; }
        .stick { width: 2px; height: 40px; background: #5c3a21; position: relative; }
        .app-card.ritual-active .stick::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #ffc9a8; box-shadow: 0 0 8px #ff9e61; }
        .censer { width: 40px; height: 20px; background: #333; border-radius: 0 0 10px 10px; }

        .blocks-wrap { display: flex; gap: 15px; opacity: 0; transform: translateY(-10px); transition: 0.5s; }
        .app-card.ritual-active .blocks-wrap { opacity: 1; transform: translateY(0); }
        .block { width: 30px; height: 50px; background: var(--vivid-red); border-radius: 50% 10% 10% 50% / 50% 10% 10% 50%; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .block-1.flat-up { background: #eee; border: 1.5px solid #ccc; transform: rotateY(180deg); }
        @keyframes toss { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-10px, -40px) rotate(180deg); } 100% { transform: translate(0, 0) rotate(360deg); } }
        .app-card.tossing .block { animation: toss 0.7s ease-out; }

        .result-display {
            min-height: 110px; display: grid; grid-template-columns: repeat(3, 1fr); justify-items: center; align-items: center; gap: 12px 8px; margin: 15px auto; max-width: 260px;
        }
        .result-display.weili-mode { grid-template-columns: repeat(4, 1fr); }

        .ball {
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; font-weight: 800; background: radial-gradient(circle at 30% 30%, #fff 0%, #cfcfcf 100%); color: #600; box-shadow: 0 5px 10px rgba(0,0,0,0.5); animation: ballPop 0.5s both;
        }
        .ball.special { background: radial-gradient(circle at 30% 30%, #fff 0%, var(--gold-leaf) 100%); color: #430; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        @keyframes ballPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Probability & Foldable Explanation */
        .prob-section { margin-bottom: 25px; padding: 0 10px; opacity: 0; transition: 0.8s; }
        .prob-section.show { opacity: 1; }
        .prob-label { font-size: 0.6rem; color: var(--gold-leaf); letter-spacing: 2px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #prob-reason { font-weight: 900; font-size: 0.75rem; letter-spacing: 1px; }
        .prob-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .prob-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #555, var(--gold-leaf)); transition: width 1.5s cubic-bezier(0.1, 0, 0.2, 1); }

        .details-toggle { 
            margin-top: 12px; font-size: 0.55rem; color: rgba(212, 175, 55, 0.5); text-decoration: underline; cursor: pointer; border: none; background: none; letter-spacing: 1px;
        }
        .details-content { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 8px;
        }
        .details-content.open { max-height: 200px; padding: 12px; }
        .details-text { font-size: 0.6rem; color: #aaa; text-align: left; line-height: 1.5; margin: 0; }

        .action-btn { background: linear-gradient(180deg, #900 0%, var(--imperial-red) 100%); color: var(--gold-leaf); border: 1px solid rgba(212, 175, 55, 0.3); width: 100%; padding: 18px; font-size: 0.95rem; font-weight: 900; border-radius: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .action-btn:disabled { opacity: 0.5; }

        .footer-note { margin-top: 20px; font-size: 0.5rem; color: rgba(212, 175, 55, 0.15); letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="smoke-wrap">
        <div class="smoke-particle" style="left: 20%;"></div>
        <div class="smoke-particle" style="left: 50%; animation-delay: -4s;"></div>
        <div class="smoke-particle" style="left: 80%; animation-delay: -8s;"></div>
    </div>

    <div class="app-card" id="app-card">
        <header>
            <h1>CAISHEN NODE</h1>
            <p>Predictive Ritual Protocol v5.0</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">DALETO</button>
            <button class="mode-btn" id="tab-super" onclick="switchMode('super')">WEILI</button>
        </div>

        <div class="ritual-zone">
            <div class="censer-wrap"><div class="incense-sticks"><div class="stick"></div><div class="stick" style="height: 50px;"></div><div class="stick"></div></div><div class="censer"></div></div>
            <div class="blocks-wrap"><div class="block" id="block-1"></div><div class="block" id="block-2"></div></div>
        </div>

        <div class="result-display" id="display"></div>

        <div class="prob-section" id="prob-wrap">
            <div class="prob-label">
                <span id="prob-reason">ANALYZING AURA...</span>
                <span id="prob-value" style="opacity: 0.6;">0%</span>
            </div>
            <div class="prob-bar-bg"><div class="prob-bar-fill" id="prob-fill"></div></div>
            
            <button class="details-toggle" onclick="toggleDetails()">How is this calculated?</button>
            <div class="details-content" id="details-box">
                <p class="details-text" id="details-explanation">
                    The Oracle evaluates the harmonic distance between numbers, yin-yang balance (odd/even), and temporal alignment with the Divine Node.
                </p>
            </div>
        </div>

        <button class="action-btn" id="main-btn" onclick="performRitual()">Invoke Divine</button>
        
        <div class="footer-note">Divine Algorithm Secured • Ritual Sync Active</div>
    </div>

    <script>
        let mode = 'lotto';

        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${newMode}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('display').className = 'result-display' + (newMode === 'super' ? ' weili-mode' : '');
            document.getElementById('prob-wrap').classList.remove('show');
            document.getElementById('details-box').classList.remove('open');
            resetRitual();
        }

        function toggleDetails() {
            document.getElementById('details-box').classList.toggle('open');
        }

        function resetRitual() {
            document.getElementById('app-card').classList.remove('ritual-active', 'tossing');
            document.getElementById('block-1').classList.remove('flat-up');
        }

        async function performRitual() {
            const display = document.getElementById('display');
            const btn = document.getElementById('main-btn');
            const probWrap = document.getElementById('prob-wrap');
            const probFill = document.getElementById('prob-fill');
            const probVal = document.getElementById('prob-value');
            const probReason = document.getElementById('prob-reason');
            const detailsBox = document.getElementById('details-box');
            const detailsTxt = document.getElementById('details-explanation');

            display.innerHTML = '';
            probWrap.classList.remove('show');
            detailsBox.classList.remove('open');
            probFill.style.width = '0%';
            resetRitual();
            btn.disabled = true;
            
            document.getElementById('app-card').classList.add('ritual-active');
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            await new Promise(r => setTimeout(r, 700));

            document.getElementById('app-card').classList.add('tossing');
            if (window.navigator.vibrate) window.navigator.vibrate([30, 80, 30, 80]);
            await new Promise(r => setTimeout(r, 700));

            document.getElementById('app-card').classList.remove('tossing');
            document.getElementById('block-1').classList.add('flat-up');
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
            await new Promise(r => setTimeout(r, 500));

            let finalNumbers = [];
            if (mode === 'lotto') {
                finalNumbers = pick(49, 6);
                finalNumbers.forEach((n, i) => setTimeout(() => addBall(n, false), i * 100));
            } else {
                finalNumbers = pick(38, 6);
                const spec = Math.floor(Math.random() * 8) + 1;
                finalNumbers.forEach((n, i) => setTimeout(() => addBall(n, false), i * 100));
                setTimeout(() => addBall(spec, true), 700);
            }

            setTimeout(() => {
                const result = calculateOracle(finalNumbers);
                probWrap.classList.add('show');
                probReason.innerText = result.reason;
                detailsTxt.innerText = result.explanation;
                probFill.style.width = result.score + '%';
                animateValue(probVal, 0, result.score, 1500);
            }, 900);

            setTimeout(() => { btn.disabled = false; }, 2200);
        }

        function calculateOracle(nums) {
            // Updated: Lower base probability for realism (12% - 32%)
            let score = Math.floor(Math.random() * 20) + 12; 
            let reason = "AURA NEUTRAL (氣場平緩)";
            let explanation = "The number distribution is standard. No significant resonance detected in the current temporal node.";

            // 1. Yin-Yang (Odd/Even Balance)
            const odds = nums.filter(n => n % 2 !== 0).length;
            if (odds >= 2 && odds <= 4) {
                score += 8;
                reason = "YIN-YANG BALANCE (陰陽調和)";
                explanation = "A balanced ratio of Odd and Even numbers (3:3 or 4:2) suggests a stable energy flow, increasing structural probability.";
            }

            // 2. Continuous Flow (Consecutive)
            let hasConsecutive = false;
            for(let i=0; i<nums.length-1; i++) {
                if(nums[i+1] - nums[i] === 1) hasConsecutive = true;
            }
            if(hasConsecutive) {
                score += 12;
                reason = "CONTINUOUS FORTUNE (財氣連綿)";
                explanation = "Sequential numbers (e.g. 12, 13) create a 'Continuous Pulse' in the algorithm, a pattern often seen in major breakthroughs.";
            }

            // 3. Low Probability Case (Below 20%)
            if (score < 20) {
                reason = "VOID RESONANCE (虛位以待)";
                explanation = "The current sequence resides in a low-resonance zone. Great fortune often requires patience or a second consultation.";
            }

            const finalScore = Math.min(score, 65); // Realistic cap at 65%
            return { score: finalScore, reason: reason, explanation: explanation };
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + "%";
                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        function pick(max, count) {
            let p = Array.from({length: max}, (_, i) => i + 1);
            let res = [];
            for(let i=0; i<count; i++) { res.push(p.splice(Math.floor(Math.random() * p.length), 1)[0]); }
            return res.sort((a,b) => a-b);
        }

        function addBall(num, isSpecial) {
            const b = document.createElement('div');
            b.className = `ball ${isSpecial ? 'special' : ''}`;
            b.innerText = num.toString().padStart(2, '0');
            document.getElementById('display').appendChild(b);
        }
    </script>
</body>
</html>
