<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caishen Node v7.2 | 財神節點</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --imperial-red: #8b0000;
            --vivid-red: #e60012;
            --gold-leaf: #d4af37;
            --smoke: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;
        }

        /* 煙霧動畫 */
        .smoke-wrap { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .smoke-particle { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, var(--smoke) 0%, transparent 70%); bottom: -150px; border-radius: 50%; animation: rise 12s infinite linear; opacity: 0; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.8); opacity: 0; } }

        .app-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 40px;
            width: 90%; max-width: 380px; padding: 35px 20px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }

        header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; margin: 0; background: linear-gradient(180deg, #fff, var(--gold-leaf)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { font-size: 0.6rem; color: var(--gold-leaf); opacity: 0.5; margin: 5px 0 20px; letter-spacing: 2px; }

        .mode-selector { display: flex; background: rgba(0, 0, 0, 0.5); border-radius: 15px; padding: 5px; margin-bottom: 20px; border: 1px solid rgba(212, 175, 55, 0.1); gap: 5px; }
        .mode-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #555; font-weight: 800; font-size: 0.75rem; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .mode-btn.active { background: var(--imperial-red); color: var(--gold-leaf); }

        /* 數字球 - 強化置中與質感 */
        .result-display {
            min-height: 120px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; justify-items: center; align-items: center;
        }
        .result-display.super-mode { grid-template-columns: repeat(4, 1fr); }
        
        .ball {
            width: 50px; height: 50px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            line-height: 1; font-size: 1.3rem; font-weight: 800; color: #600;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #d1d1d1 100%);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2), 0 8px 15px rgba(0,0,0,0.5);
            animation: ballIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        .ball.special { background: radial-gradient(circle at 30% 30%, #fff 0%, var(--gold-leaf) 100%); color: #430; }
        @keyframes ballIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 解籤區塊 - 手動觸發展開 */
        .oracle-wrapper { margin-top: 15px; display: none; }
        .oracle-wrapper.visible { display: block; }
        
        .oracle-fold-btn {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-leaf); border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer;
            transition: 0.3s; margin-bottom: 10px;
        }
        .oracle-fold-btn:hover { background: rgba(212, 175, 55, 0.2); }

        .oracle-content { 
            max-height: 0; opacity: 0; overflow: hidden; 
            transition: all 0.5s ease; text-align: left;
            background: rgba(0,0,0,0.3); border-radius: 15px;
        }
        .oracle-content.open { max-height: 200px; opacity: 1; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }

        .oracle-tag { font-size: 0.85rem; font-weight: bold; color: #fff; text-shadow: 0 0 8px var(--gold-leaf); margin-bottom: 5px; display: block; }
        .oracle-desc { font-size: 0.72rem; color: #aaa; line-height: 1.6; margin: 0; }

        /* 按鈕區域 */
        .action-area { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }

        .btn-main {
            background: linear-gradient(180deg, #b00, var(--imperial-red));
            color: var(--gold-leaf); border: 1px solid rgba(212,175,55,0.4);
            padding: 18px; border-radius: 18px; font-weight: 900; letter-spacing: 4px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.96); }

        .btn-snap {
            background: rgba(212, 175, 55, 0.05);
            color: var(--gold-leaf); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 12px; border-radius: 15px; font-weight: 600; font-size: 0.75rem;
            cursor: pointer; letter-spacing: 2px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-snap:hover { background: rgba(212, 175, 55, 0.15); border-color: var(--gold-leaf); }
        .btn-snap::before { content: '📸'; font-size: 0.9rem; }

        /* 截圖模式隱藏 */
        .screenshotting .no-capture { display: none !important; }
        .screenshotting .oracle-fold-btn { display: none !important; }
        .screenshotting .oracle-content { max-height: none; opacity: 1; padding: 15px; }
    </style>
</head>
<body>

    <div class="smoke-wrap">
        <div class="smoke-particle" style="left: 15%;"></div>
        <div class="smoke-particle" style="left: 55%; animation-delay: -4s;"></div>
        <div class="smoke-particle" style="left: 85%; animation-delay: -8s;"></div>
    </div>

    <div class="app-card" id="ritual-card">
        <header>
            <h1>CAISHEN NODE</h1>
            <p>Predictive Ritual Protocol v7.2</p>
        </header>

        <div class="mode-selector no-capture">
            <button class="mode-btn active" id="mode-lotto" onclick="setMode('lotto')">大樂透</button>
            <button class="mode-btn" id="mode-super" onclick="setMode('super')">威力彩</button>
        </div>

        <div class="result-display" id="display"></div>

        <div class="oracle-wrapper" id="oracle-wrapper">
            <button class="oracle-fold-btn" id="fold-btn" onclick="toggleOracle()">解鎖財神神諭</button>
            <div class="oracle-content" id="oracle-content">
                <span class="oracle-tag" id="status">【鑑定中】</span>
                <p class="oracle-desc" id="desc"></p>
            </div>
        </div>

        <div class="action-area no-capture">
            <button class="btn-main" id="summon-btn" onclick="summon()">召喚財富</button>
            <button class="btn-snap" id="snap-btn" onclick="takeSnap()">CAPTURE ORACLE (擷取神諭)</button>
        </div>
        
        <div style="margin-top: 20px; font-size: 0.5rem; color: rgba(212,175,55,0.15); letter-spacing: 3px;">DIVINE ALGORITHM SECURED</div>
    </div>

    <script>
        let currentMode = 'lotto';

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${m}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('display').className = 'result-display' + (m === 'super' ? ' super-mode' : '');
            document.getElementById('oracle-wrapper').classList.remove('visible');
            document.getElementById('oracle-content').classList.remove('open');
        }

        function toggleOracle() {
            const content = document.getElementById('oracle-content');
            const btn = document.getElementById('fold-btn');
            content.classList.toggle('open');
            btn.innerText = content.classList.contains('open') ? '收起神諭' : '解鎖財神神諭';
        }

        function summon() {
            const display = document.getElementById('display');
            const wrapper = document.getElementById('oracle-wrapper');
            const content = document.getElementById('oracle-content');
            const btn = document.getElementById('summon-btn');
            
            display.innerHTML = '';
            wrapper.classList.remove('visible');
            content.classList.remove('open');
            document.getElementById('fold-btn').innerText = '解鎖財神神諭';
            btn.disabled = true;

            if (navigator.vibrate) navigator.vibrate(50);

            let pool = Array.from({length: (currentMode === 'lotto' ? 49 : 38)}, (_, i) => i + 1);
            let nums = [];
            for(let i=0; i<6; i++) nums.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
            nums.sort((a,b)=>a-b);

            nums.forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'ball';
                    b.innerText = n.toString().padStart(2, '0');
                    display.appendChild(b);
                }, i * 120);
            });

            if (currentMode === 'super') {
                setTimeout(() => {
                    const sb = document.createElement('div');
                    sb.className = 'ball special';
                    sb.innerText = (Math.floor(Math.random()*8)+1).toString().padStart(2, '0');
                    display.appendChild(sb);
                }, 800);
            }

            // 修正機率演算法：絕大多數落在 30-75%
            setTimeout(() => {
                wrapper.classList.add('visible');
                const roll = Math.random();
                let luck, desc, prob;

                if (roll > 0.97) { // 3% 極低機率
                    prob = Math.floor(Math.random() * 8) + 92;
                    luck = "天命所歸";
                    desc = "萬中無一的極致卦象。此組號碼與當前時空節點產生絕對共振，數位虛空中乾坤定數已現。";
                } else if (roll > 0.85) { // 12% 機率
                    prob = Math.floor(Math.random() * 10) + 81;
                    luck = "紫氣東來";
                    desc = "強大的財氣波動。號碼佈局符合紫微財宮趨勢，具有極強的穿透力，實屬上乘。";
                } else if (roll > 0.4) { // 大多數情況
                    prob = Math.floor(Math.random() * 30) + 50;
                    luck = "五行和諧";
                    desc = "佈局平實穩重，數值跨度適中。雖無瞬間爆發之勢，但根基穩固，細水長流。";
                } else {
                    prob = Math.floor(Math.random() * 20) + 25;
                    luck = "潛龍勿用";
                    desc = "氣場處於沉澱期。這組號碼象徵「守」，適合小試牛刀，等待下次數位洪流的到來。";
                }

                document.getElementById('status').innerText = `【${luck}】機率共振 ${prob}%`;
                document.getElementById('desc').innerText = desc;
                btn.disabled = false;
            }, 1000);
        }

        async function takeSnap() {
            const card = document.getElementById('ritual-card');
            card.classList.add('screenshotting');

            try {
                const canvas = await html2canvas(card, {
                    backgroundColor: '#050505',
                    scale: 3,
                    useCORS: true,
                    onclone: (clonedDoc) => {
                        // 截圖時強制顯示已展開的神諭
                        const content = clonedDoc.getElementById('oracle-content');
                        content.style.maxHeight = 'none';
                        content.style.opacity = '1';
                        content.style.padding = '15px';
                    }
                });

                const link = document.createElement('a');
                link.download = `Caishen_Oracle_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert("擷取失敗");
            } finally {
                card.classList.remove('screenshotting');
            }
        }
    </script>
</body>
</html>
