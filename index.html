<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LottoLab">
    
    <title>Lotto Lab | Daleto & Weili</title>
    
    <style>
        :root {
            --bg-vivid: #0f172a;
            --btn-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --ball-grad: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            --special-grad: linear-gradient(135deg, #facc15 0%, #fb923c 100%);
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-vivid);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(99, 102, 241, 0.2); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(232, 121, 249, 0.2); bottom: -50px; right: -50px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .app-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            width: 88%;
            max-width: 380px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0 0 5px 0;
            color: #fff;
        }

        header p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .mode-selector {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mode-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.4);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 15px;
        }

        .mode-btn.active {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: scale(1.02);
        }

        .result-display {
            min-height: 160px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 35px;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 16px; /* Squircle style */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--ball-grad);
            color: #1e293b;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .ball.special {
            background: var(--special-grad);
            color: #fff;
            box-shadow: 0 8px 20px rgba(251, 146, 60, 0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .action-btn {
            background: var(--btn-grad);
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 22px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .action-btn:active {
            transform: scale(0.95);
            filter: brightness(1.1);
        }

        .status {
            margin-top: 25px;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="app-card">
        <header>
            <h1>LOTTO LAB</h1>
            <p>Pick Your Future</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">DALETO</button>
            <button class="mode-btn" id="tab-super" onclick="switchMode('super')">WEILI</button>
        </div>

        <div class="result-display" id="display"></div>

        <button class="action-btn" onclick="generate()">Punch It</button>
        
        <div class="status" id="status">Ready to roll</div>
    </div>

    <script>
        let mode = 'lotto';

        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${newMode}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('status').innerText = newMode === 'lotto' ? 'Daleto 6/49' : 'Weili 6/38 + 1/8';
        }

        function generate() {
            const display = document.getElementById('display');
            display.innerHTML = '';
            if (window.navigator.vibrate) window.navigator.vibrate([20, 10, 20]);

            if (mode === 'lotto') {
                pick(49, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 80);
                });
            } else {
                pick(38, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 80);
                });
                const z2 = Math.floor(Math.random() * 8) + 1;
                setTimeout(() => addBall(z2, true), 550);
            }
        }

        function pick(max, count) {
            let p = Array.from({length: max}, (_, i) => i + 1);
            let res = [];
            for(let i=0; i<count; i++) {
                res.push(p.splice(Math.floor(Math.random() * p.length), 1)[0]);
            }
            return res.sort((a,b) => a-b);
        }

        function addBall(num, isSpecial) {
            const b = document.createElement('div');
            b.className = `ball ${isSpecial ? 'special' : ''}`;
            b.innerText = num.toString().padStart(2, '0');
            document.getElementById('display').appendChild(b);
        }
    </script>
</body>
</html>
