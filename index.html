<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caishen Node v6.9 | Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --dark-red: #8b0000;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        /* 截圖範圍核心 */
        .app-card {
            background-color: #111111; /* 使用實色背景 */
            border: 2px solid var(--gold);
            border-radius: 30px;
            width: 350px; padding: 30px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header h1 { font-size: 1.5rem; letter-spacing: 5px; margin: 0; color: #fff; }
        header p { font-size: 0.7rem; color: var(--gold); margin: 5px 0 20px; opacity: 0.8; }

        .result-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; margin: 20px 0; min-height: 120px;
        }
        .result-grid.super-mode { grid-template-columns: repeat(4, 1fr); }

        /* 數字球 - 確保 html2canvas 能量化的樣式 */
        .ball {
            width: 50px; height: 50px; 
            background-color: #ffffff !important; /* 截圖時顯示的關鍵 */
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.3rem; font-weight: bold;
            color: #000000 !important; /* 修正顏色確保可見 */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            margin: auto;
        }
        .ball.special {
            background-color: var(--gold) !important;
            color: #fff !important;
        }

        .oracle-section { opacity: 0; transition: 0.5s; margin-top: 15px; }
        .oracle-section.show { opacity: 1; }
        .oracle-title { color: var(--gold); font-weight: bold; font-size: 1rem; }
        .oracle-text { font-size: 0.8rem; color: #ccc; margin-top: 5px; line-height: 1.5; }

        .btn-group { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        
        .main-btn {
            background-color: var(--dark-red);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px; border-radius: 15px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        
        .snap-btn {
            background: transparent; color: #555; border: 1px solid #333;
            padding: 10px; border-radius: 10px; font-size: 0.7rem; cursor: pointer;
        }

        /* 截圖時隱藏 */
        .capturing .no-print { display: none !important; }
    </style>
</head>
<body>

    <div class="app-card" id="capture-box">
        <header>
            <h1>CAISHEN NODE</h1>
            <p>Predictive Ritual Protocol v6.9</p>
        </header>

        <div class="result-grid" id="ball-container">
            </div>

        <div class="oracle-section" id="oracle-box">
            <div class="oracle-title" id="oracle-status">-- 鑑定中 --</div>
            <div class="oracle-text" id="oracle-desc"></div>
        </div>

        <div class="btn-group no-print">
            <button class="main-btn" onclick="startRitual()">召喚財富</button>
            <button class="snap-btn" onclick="captureImage()">CAPTURE ORACLE (擷取神諭)</button>
        </div>
        
        <div style="margin-top: 20px; font-size: 0.5rem; color: #222;">ENCRYPTED BY CAISHEN PROTOCOL</div>
    </div>

    <script>
        let isSuperMode = false; // 預設大樂透，需要的話可以加切換

        function startRitual() {
            const container = document.getElementById('ball-container');
            const oracle = document.getElementById('oracle-box');
            container.innerHTML = '';
            oracle.classList.remove('show');

            // 生成號碼
            let nums = [];
            let pool = Array.from({length: 49}, (_, i) => i + 1);
            for(let i=0; i<6; i++) {
                let idx = Math.floor(Math.random() * pool.length);
                nums.push(pool.splice(idx, 1)[0]);
            }
            nums.sort((a,b) => a-b);

            // 渲染球體
            nums.forEach((n, i) => {
                const b = document.createElement('div');
                b.className = 'ball';
                b.innerText = n.toString().padStart(2, '0');
                container.appendChild(b);
            });

            // 顯示鑑定結果
            setTimeout(() => {
                oracle.classList.add('show');
                document.getElementById('oracle-status').innerText = "【紫氣東來】機率感測 88%";
                document.getElementById('oracle-desc').innerText = "檢測到強大的數值共振，此佈局符合當前財位。";
            }, 500);
        }

        async function captureImage() {
            const box = document.getElementById('capture-box');
            
            // 標記截圖中
            box.classList.add('capturing');

            // 給予一點點時間讓瀏覽器處理樣式切換
            await new Promise(r => setTimeout(r, 100));

            html2canvas(box, {
                backgroundColor: '#050505',
                scale: 2,
                useCORS: true,
                logging: false,
                // 強制繪製文字
                onclone: (clonedDoc) => {
                    // 可以在這裡強制調整複製出的 DOM 樣式，確保萬無一失
                    const clonedBalls = clonedDoc.querySelectorAll('.ball');
                    clonedBalls.forEach(b => {
                        b.style.display = 'flex';
                        b.style.color = '#000000';
                        b.style.backgroundColor = '#ffffff';
                    });
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Divine_Oracle_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                box.classList.remove('capturing');
            }).catch(err => {
                alert("擷取失敗");
                box.classList.remove('capturing');
            });
        }
    </script>
</body>
</html>
