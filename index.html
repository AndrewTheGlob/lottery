<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CaishenNode">
    
    <title>Caishen Node | Digital Prosperity</title>
    
    <style>
        :root {
            --imperial-red: #7a0000;
            --gold-leaf: #d4af37;
            --deep-black: #0d0d0d;
            --ball-white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #220000 0%, #050505 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(122,0,0,0.12) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
            animation: drift 25s infinite alternate;
        }
        .cloud-top { top: -250px; right: -150px; }
        .cloud-bottom { bottom: -250px; left: -150px; animation-delay: -12s; }

        @keyframes drift {
            from { transform: translate(0,0) rotate(0deg); }
            to { transform: translate(40px, 60px) rotate(10deg); }
        }

        .app-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 32px;
            width: 85%;
            max-width: 380px;
            padding: 45px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(122,0,0,0.1);
            position: relative;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, var(--gold-leaf) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.65rem;
            color: var(--gold-leaf);
            opacity: 0.5;
            margin-top: 8px;
            margin-bottom: 35px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .mode-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 35px;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .mode-btn {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: #555;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            letter-spacing: 1px;
        }

        .mode-btn.active {
            background: var(--imperial-red);
            color: var(--gold-leaf);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .result-display {
            min-height: 150px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 800;
            background: radial-gradient(circle at 35% 35%, #fff 0%, #d9d9d9 100%);
            color: var(--imperial-red);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .ball.special {
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--gold-leaf) 100%);
            color: #3d2e00;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.35);
        }

        @keyframes pop {
            0% { transform: translateY(25px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .action-btn {
            background: linear-gradient(180deg, #a50000 0%, var(--imperial-red) 100%);
            color: var(--gold-leaf);
            border: 1px solid rgba(212, 175, 55, 0.4);
            width: 100%;
            padding: 22px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            transition: 0.3s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .action-btn:active {
            transform: scale(0.96);
            filter: brightness(1.3);
        }

        .status {
            margin-top: 35px;
            font-size: 0.65rem;
            color: rgba(212, 175, 55, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="cloud cloud-top"></div>
    <div class="cloud cloud-bottom"></div>

    <div class="app-card">
        <header>
            <h1>CAISHEN NODE</h1>
            <p>Digital Wealth Protocol</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">DALETO</button>
            <button class="mode-btn" id="tab-super" onclick="switchMode('super')">WEILI</button>
        </div>

        <div class="result-display" id="display"></div>

        <button class="action-btn" onclick="generate()">Invoke Luck</button>
        
        <div class="status" id="status">Secure Connection Active</div>
    </div>

    <script>
        let mode = 'lotto';

        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${newMode}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('status').innerText = newMode === 'lotto' ? 'Accessing Daleto...' : 'Accessing Weili...';
        }

        function generate() {
            const display = document.getElementById('display');
            display.innerHTML = '';
            if (window.navigator.vibrate) window.navigator.vibrate([40, 60, 40]);

            if (mode === 'lotto') {
                pick(49, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 110);
                });
            } else {
                pick(38, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 110);
                });
                const z2 = Math.floor(Math.random() * 8) + 1;
                setTimeout(() => addBall(z2, true), 770);
            }
        }

        function pick(max, count) {
            let p = Array.from({length: max}, (_, i) => i + 1);
            let res = [];
            for(let i=0; i<count; i++) {
                res.push(p.splice(Math.floor(Math.random() * p.length), 1)[0]);
            }
            return res.sort((a,b) => a-b);
        }

        function addBall(num, isSpecial) {
            const b = document.createElement('div');
            b.className = `ball ${isSpecial ? 'special' : ''}`;
            b.innerText = num.toString().padStart(2, '0');
            document.getElementById('display').appendChild(b);
        }
    </script>
</body>
</html>
