<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CaishenNode">
    
    <title>Caishen Node | Ritual Protocol</title>
    
    <style>
        :root {
            --imperial-red: #8b0000;
            --gold-leaf: #d4af37;
            --smoke: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ambient Smoke Effect */
        .smoke-wrap {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .smoke-particle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--smoke) 0%, transparent 70%);
            bottom: -150px;
            border-radius: 50%;
            animation: rise 10s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .app-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 35px;
            width: 85%;
            max-width: 380px;
            padding: 50px 25px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            position: relative;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(180deg, #fff, var(--gold-leaf));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.65rem;
            color: var(--gold-leaf);
            opacity: 0.4;
            margin-top: 10px;
            margin-bottom: 35px;
            letter-spacing: 4px;
        }

        .mode-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 35px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #444;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.4s;
            border-radius: 10px;
        }

        .mode-btn.active {
            background: var(--imperial-red);
            color: var(--gold-leaf);
        }

        /* Result Display Area */
        .result-display {
            min-height: 150px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 800;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #d1d1d1 100%);
            color: #600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: ballPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) both;
        }

        .ball.special {
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--gold-leaf) 100%);
            color: #430;
        }

        @keyframes ballPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Ritual Message (Divine Answer) */
        .ritual-msg {
            font-size: 0.9rem;
            color: var(--gold-leaf);
            font-weight: 700;
            height: 20px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            opacity: 0;
            transition: 0.3s;
        }

        .action-btn {
            background: linear-gradient(180deg, #900 0%, var(--imperial-red) 100%);
            color: var(--gold-leaf);
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            padding: 22px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .action-btn:active { transform: scale(0.97); }

        .footer-note {
            margin-top: 35px;
            font-size: 0.6rem;
            color: rgba(212, 175, 55, 0.2);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="smoke-wrap">
        <div class="smoke-particle" style="left: 20%; animation-delay: 0s;"></div>
        <div class="smoke-particle" style="left: 50%; animation-delay: -3s;"></div>
        <div class="smoke-particle" style="left: 80%; animation-delay: -7s;"></div>
    </div>

    <div class="app-card">
        <header>
            <h1>CAISHEN NODE</h1>
            <p>Blessing Interface v2.6</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">DALETO</button>
            <button class="mode-btn" id="tab-super" onclick="switchMode('super')">WEILI</button>
        </div>

        <div id="ritual-status" class="ritual-msg"></div>

        <div class="result-display" id="display"></div>

        <button class="action-btn" id="main-btn" onclick="startRitual()">Start Ritual</button>
        
        <div class="footer-note">Protocol Secure • Divine Link Est.</div>
    </div>

    <script>
        let mode = 'lotto';

        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${newMode}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('ritual-status').style.opacity = '0';
        }

        async function startRitual() {
            const display = document.getElementById('display');
            const status = document.getElementById('ritual-status');
            const btn = document.getElementById('main-btn');

            // Reset
            display.innerHTML = '';
            btn.disabled = true;
            status.style.opacity = '1';
            
            // Step 1: Throwing Divination Blocks (筊杯)
            status.innerText = "CONSULTING...";
            if (window.navigator.vibrate) window.navigator.vibrate([30, 100, 30]);
            await sleep(800);

            // Step 2: Divine Approval
            status.innerText = "GRANTED (聖筊)";
            if (window.navigator.vibrate) window.navigator.vibrate([150, 50, 150]);
            await sleep(600);

            // Step 3: Draw Numbers
            if (mode === 'lotto') {
                pick(49, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 120);
                });
            } else {
                pick(38, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 120);
                });
                const z2 = Math.floor(Math.random() * 8) + 1;
                setTimeout(() => addBall(z2, true), 840);
            }

            setTimeout(() => { 
                btn.disabled = false;
                status.innerText = "PROSPERITY REVEALED";
            }, 1200);
        }

        function pick(max, count) {
            let p = Array.from({length: max}, (_, i) => i + 1);
            let res = [];
            for(let i=0; i<count; i++) {
                res.push(p.splice(Math.floor(Math.random() * p.length), 1)[0]);
            }
            return res.sort((a,b) => a-b);
        }

        function addBall(num, isSpecial) {
            const b = document.createElement('div');
            b.className = `ball ${isSpecial ? 'special' : ''}`;
            b.innerText = num.toString().padStart(2, '0');
            document.getElementById('display').appendChild(b);
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    </script>
</body>
</html>
