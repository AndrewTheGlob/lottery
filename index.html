<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LottoLab">
    
    <title>Lotto Lab | Fortune Edition</title>
    
    <style>
        :root {
            /* Imperial Palette */
            --imperial-red: #8b0000;
            --gold-leaf: #d4af37;
            --deep-black: #121212;
            --ball-white: #fdfdfd;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #2c0000 0%, #0a0a0a 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Abstract Cloud Patterns */
        .cloud {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,0,0,0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
            animation: drift 20s infinite alternate;
        }
        .cloud-top { top: -200px; right: -100px; }
        .cloud-bottom { bottom: -200px; left: -100px; animation-delay: -10s; }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(30px, 50px) scale(1.1); }
        }

        .app-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            /* Golden Border with glow */
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            width: 85%;
            max-width: 380px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(139,0,0,0.2);
            position: relative;
        }

        /* Decorative Corner Elements (The "Fortune" touch) */
        .app-card::before, .app-card::after {
            content: '🧧'; /* Symbolic representation */
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.5;
        }
        .app-card::before { top: 15px; left: 15px; }
        .app-card::after { bottom: 15px; right: 15px; }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--gold-leaf) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.7rem;
            color: var(--gold-leaf);
            opacity: 0.6;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .mode-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 35px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.4s;
            border-radius: 8px;
        }

        .mode-btn.active {
            background: rgba(139, 0, 0, 0.8);
            color: var(--gold-leaf);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .result-display {
            min-height: 140px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%; /* Traditional circle */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 800;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #e0e0e0 100%);
            color: var(--imperial-red);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            animation: fortunePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .ball.special {
            background: radial-gradient(circle at 30% 30%, #fff 0%, var(--gold-leaf) 100%);
            color: #4a3700;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        @keyframes fortunePop {
            0% { transform: translateY(30px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .action-btn {
            background: linear-gradient(135deg, var(--imperial-red) 0%, #4a0000 100%);
            color: var(--gold-leaf);
            border: 1px solid var(--gold-leaf);
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(139,0,0,0.3);
        }

        .action-btn:active {
            transform: scale(0.97);
            filter: brightness(1.2);
        }

        .status {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="cloud cloud-top"></div>
    <div class="cloud cloud-bottom"></div>

    <div class="app-card">
        <header>
            <h1>LOTTO LAB</h1>
            <p>Blessing From Above</p>
        </header>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="tab-lotto" onclick="switchMode('lotto')">DALETO</button>
            <button class="mode-btn" id="tab-super" onclick="switchMode('super')">WEILI</button>
        </div>

        <div class="result-display" id="display"></div>

        <button class="action-btn" onclick="generate()">Draw Luck</button>
        
        <div class="status" id="status">Prosperity Awaits</div>
    </div>

    <script>
        let mode = 'lotto';

        function switchMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${newMode}`).classList.add('active');
            document.getElementById('display').innerHTML = '';
            document.getElementById('status').innerText = newMode === 'lotto' ? 'Daleto Sequence' : 'Weili Sequence';
        }

        function generate() {
            const display = document.getElementById('display');
            display.innerHTML = '';
            if (window.navigator.vibrate) window.navigator.vibrate([30, 50, 30]);

            if (mode === 'lotto') {
                pick(49, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 120);
                });
            } else {
                pick(38, 6).forEach((n, i) => {
                    setTimeout(() => addBall(n, false), i * 120);
                });
                const z2 = Math.floor(Math.random() * 8) + 1;
                setTimeout(() => addBall(z2, true), 840);
            }
        }

        function pick(max, count) {
            let p = Array.from({length: max}, (_, i) => i + 1);
            let res = [];
            for(let i=0; i<count; i++) {
                res.push(p.splice(Math.floor(Math.random() * p.length), 1)[0]);
            }
            return res.sort((a,b) => a-b);
        }

        function addBall(num, isSpecial) {
            const b = document.createElement('div');
            b.className = `ball ${isSpecial ? 'special' : ''}`;
            b.innerText = num.toString().padStart(2, '0');
            document.getElementById('display').appendChild(b);
        }
    </script>
</body>
</html>
